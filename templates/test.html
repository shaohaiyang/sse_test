<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试 - {{ level_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <span>学生: {{ session.student_name }}</span>
            <div>
                <a href="{{ url_for('result') }}" class="btn btn-small">查看结果</a>
                <a href="{{ url_for('logout') }}" class="btn btn-small">退出</a>
            </div>
        </div>

        <div class="stage-bar">
            {% for i in range(1, total_levels + 1) %}
            <a href="{{ url_for('test', level=i) }}" class="stage-btn {% if i == level %}stage-current{% elif i in completed_set %}stage-done{% else %}stage-pending{% endif %}">
                {{ i }}
            </a>
            {% endfor %}
        </div>

        <div class="card">
            <h2>{{ level_name }}</h2>
            <p class="level-desc">请选择每个单词对应的中文意思</p>

            <form method="POST" action="{{ url_for('submit') }}" id="test-form">
                <input type="hidden" name="level" value="{{ level }}">
                {% for q in questions %}
                <div class="question-card">
                    <div class="question-header">
                        <span class="q-number">{{ q.number }}</span>
                        <span class="q-word">{{ q.word }}</span>
                        <button type="button" class="speaker-btn" data-word="{{ q.word|e }}" data-sentence="{{ q.sentence|e }}" title="朗读">
                            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                            </svg>
                        </button>
                        <span class="q-sentence">{{ q.sentence }}</span>
                    </div>
                    <div class="options">
                        {% for letter in ['a', 'b', 'c', 'd'] %}
                        <label class="option-label">
                            <input type="radio" name="q_{{ q.number }}" value="{{ letter }}"
                                   onchange="this.closest('.option-label').classList.add('selected')"
                                   {% if loop.first %}required{% endif %}>
                            <span class="option-letter">{{ letter }}.</span>
                            <span class="option-text">{{ q.options[letter] }}</span>
                        </label>
                        {% endfor %}
                    </div>
                </div>
                {% endfor %}

                <button type="submit" class="btn btn-primary btn-large">提交答案</button>
            </form>
        </div>
    </div>

<script>
var utter = null;
var preferredVoice = null;
var iOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

function pickVoice(voices) {
    var ranked = ['Karen', 'Samantha', 'Daniel', 'Google UK English Female', 'Google UK English Male'];
    for (var r = 0; r < ranked.length; r++) {
        for (var i = 0; i < voices.length; i++) {
            if (voices[i].name.indexOf(ranked[r]) !== -1) {
                return voices[i];
            }
        }
    }
    for (var i = 0; i < voices.length; i++) {
        if (voices[i].lang.startsWith('en')) return voices[i];
    }
    return null;
}

function initVoice() {
    var voices = speechSynthesis.getVoices();
    if (voices.length > 0) preferredVoice = pickVoice(voices);
}

if (speechSynthesis.getVoices().length > 0) {
    initVoice();
}
speechSynthesis.onvoiceschanged = initVoice;

document.addEventListener('click', function(e) {
    var btn = e.target.closest('.speaker-btn');
    if (!btn) return;
    if (utter) window.speechSynthesis.cancel();
    var word = btn.getAttribute('data-word');
    var sentence = btn.getAttribute('data-sentence');
    var text = word + '. ' + sentence;
    utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    utter.rate = 1.0;
    if (preferredVoice) utter.voice = preferredVoice;
    window.speechSynthesis.speak(utter);
    if (iOS) {
        window.speechSynthesis.pause();
        window.speechSynthesis.resume();
    }
});
</script>
</body>
</html>
