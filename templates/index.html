<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语词汇量测试</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card" style="max-width: 480px;">
            <h1>英语词汇量测试</h1>
            <p class="subtitle">基于 14 Thousand 词族测试</p>
            <form method="POST" action="{{ url_for('login') }}" class="form">
                <div class="form-group">
                    <label for="name">你的名字</label>
                    <input type="text" id="name" name="name" required placeholder="请输入姓名" autofocus>
                </div>
                <div class="form-group">
                    <label for="role">角色 / 班级 <span class="hint">(选填)</span></label>
                    <input type="text" id="role" name="role" placeholder="例如：三年级一班">
                </div>
                <button type="submit" class="btn btn-primary btn-large">开始测试</button>
            </form>
            <div class="admin-link">
                <a href="{{ url_for('admin_login') }}">管理员登录</a>
            </div>
        </div>
    </div>
</body>
</html>
